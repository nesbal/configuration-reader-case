services:
  mongodb:
    image: mongo:7
    container_name: configuration-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
  rabbitmq:
    image: rabbitmq:3-management
    container_name: configuration-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  configuration-admin:
    build:
      context: .
      dockerfile: src/ConfigurationAdmin/Dockerfile
    container_name: configuration-admin
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      MongoDb__ConnectionString: "mongodb://mongodb:27017/ConfigurationDb"
      MongoDb__DatabaseName: "ConfigurationDb"
      MongoDb__CollectionName: "Configurations"
      RabbitMQ__ConnectionString: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      - mongodb
      - rabbitmq

volumes:
  mongodb_data:
services:
  mongodb:
    image: mongo:7
    container_name: configuration-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  configuration-admin:
    build:
      context: .
      dockerfile: src/ConfigurationAdmin/Dockerfile
    container_name: configuration-admin
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      MongoDb__ConnectionString: "mongodb://mongodb:27017/ConfigurationDb"
      MongoDb__DatabaseName: "ConfigurationDb"
      MongoDb__CollectionName: "Configurations"
    depends_on:
      - mongodb

volumes:
  mongodb_data: